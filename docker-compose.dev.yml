version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: retailvision_postgres_dev
    environment:
      POSTGRES_USER: retailvision
      POSTGRES_PASSWORD: retailvision
      POSTGRES_DB: retailvision_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailvision_dev

  # Redis for caching and streams
  redis:
    image: redis:7-alpine
    container_name: retailvision_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailvision_dev

  # FastAPI Backend (Development)
  backend:
    image: python:3.11-slim
    container_name: retailvision_backend_dev
    working_dir: /app
    environment:
      - SERVICE_NAME=RetailVision AI
      - SERVICE_VERSION=1.0.0
      - ENVIRONMENT=development
      - DEBUG=True
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - DATABASE_URL=postgresql://retailvision:retailvision@postgres:5432/retailvision_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./logs:/logs
      - ./models:/models
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - retailvision_dev
    restart: unless-stopped

  # Next.js Frontend (Development)
  frontend:
    image: node:20-alpine
    container_name: retailvision_frontend_dev
    working_dir: /app
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - backend
    networks:
      - retailvision_dev
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  retailvision_dev:
    driver: bridge
