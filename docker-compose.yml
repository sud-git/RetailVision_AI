version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: retailvision_postgres
    environment:
      POSTGRES_USER: retailvision
      POSTGRES_PASSWORD: retailvision
      POSTGRES_DB: retailvision_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailvision_network

  # Redis for caching and streams
  redis:
    image: redis:7-alpine
    container_name: retailvision_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailvision_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: retailvision_backend
    environment:
      - SERVICE_NAME=RetailVision AI
      - SERVICE_VERSION=1.0.0
      - ENVIRONMENT=production
      - DEBUG=False
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - DATABASE_URL=postgresql://retailvision:retailvision@postgres:5432/retailvision_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./logs:/logs
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - retailvision_network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: retailvision_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - retailvision_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  retailvision_network:
    driver: bridge
